<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --hufs-green: #146E7A;
  --hufs-navy: #002D56;
  --hufs-gold: #8D7150;
  --hufs-gray: #DADAD3;
  --hufs-silver: #9D9FA2;
  --hufs-data-blue: #2E6EA6;
  --bg: #F5F5F2;
  --card-bg: #FFFFFF;
  --text-primary: #1A1A1A;
  --text-secondary: #555555;
  --text-muted: #888888;
  --border: #E0E0DC;
  --row-hover: #F8F8F6;
  --tag-required-bg: #E8F0F2;
  --tag-required-text: #146E7A;
  --tag-lab-bg: #FFF3E6;
  --tag-lab-text: #8D7150;
}

[data-theme="dark"] {
  --bg: #121820;
  --card-bg: #1A2332;
  --text-primary: #E8E8E4;
  --text-secondary: #A8A8A4;
  --text-muted: #707070;
  --border: #2A3444;
  --row-hover: #1E2A3A;
  --tag-required-bg: #0E2E34;
  --tag-required-text: #3ABBC8;
  --tag-lab-bg: #2A2218;
  --tag-lab-text: #C8A878;
  --hufs-gray: #3A3A44;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

body.embed {
  background: transparent;
}

/* ============================================================
   HEADER
   ============================================================ */
.page-header {
  background: var(--hufs-navy);
  color: #FFFFFF;
  padding: 24px 32px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

body.embed .page-header {
  position: relative;
}

.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.header-title {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.header-title h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header-title .subtitle {
  font-size: 12px;
  font-weight: 300;
  opacity: 0.75;
}

.track-legend {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 500;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.legend-dot.track-common { background: var(--hufs-green); }
.legend-dot.track-system { background: var(--hufs-gold); }
.legend-dot.track-data   { background: var(--hufs-data-blue); }

/* ============================================================
   YEAR TABS
   ============================================================ */
.year-tabs {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  gap: 0;
  padding-top: 16px;
}

.year-tab {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.55);
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  padding: 10px 24px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}

.year-tab:hover {
  color: rgba(255,255,255,0.85);
}

.year-tab.active {
  color: #FFFFFF;
  border-bottom-color: var(--hufs-green);
  font-weight: 700;
}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.main-content {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 16px 48px;
}

/* ============================================================
   YEAR SECTION
   ============================================================ */
.year-section {
  display: none;
}

.year-section.active {
  display: block;
}

.semester-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* ============================================================
   SEMESTER CARD
   ============================================================ */
.semester-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.semester-label {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}

/* ============================================================
   COURSE TABLE
   ============================================================ */
.course-table {
  width: 100%;
  border-collapse: collapse;
}

.course-row {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.course-row:last-child {
  border-bottom: none;
}

.course-row:hover {
  background: var(--row-hover);
}

.course-row td {
  padding: 10px 12px;
  vertical-align: middle;
}

/* Track accent border */
.course-row td:first-child {
  width: 52px;
  text-align: center;
  position: relative;
}

.course-row td:first-child::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  bottom: 4px;
  width: 3px;
  border-radius: 0 2px 2px 0;
}

.course-row.track-common td:first-child::before { background: var(--hufs-green); }
.course-row.track-system td:first-child::before { background: var(--hufs-gold); }
.course-row.track-data   td:first-child::before { background: var(--hufs-data-blue); }

/* Icon */
.course-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  background: var(--hufs-gray);
  flex-shrink: 0;
}

/* Name cell */
.td-name {
  min-width: 0;
}

.course-name-kr {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.3;
  word-break: keep-all;
}

.course-name-en {
  font-size: 11px;
  font-weight: 300;
  color: var(--text-muted);
  line-height: 1.3;
  margin-top: 1px;
  word-break: break-word;
}

/* Credits */
.td-credits {
  width: 52px;
  text-align: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  white-space: nowrap;
}

/* Tags */
.td-tags {
  width: 100px;
  white-space: nowrap;
}

.tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  margin-right: 3px;
  letter-spacing: 0.3px;
}

.tag-required {
  background: var(--tag-required-bg);
  color: var(--tag-required-text);
}

.tag-lab {
  background: var(--tag-lab-bg);
  color: var(--tag-lab-text);
}

/* Professor */
.td-professor {
  width: 100px;
  font-size: 11.5px;
  color: var(--hufs-silver);
  white-space: nowrap;
}

/* ============================================================
   FOOTER
   ============================================================ */
.page-footer {
  text-align: center;
  padding: 16px;
  font-size: 11px;
  color: var(--text-muted);
}

.page-footer a {
  color: var(--hufs-green);
  text-decoration: none;
}

body.embed .page-footer {
  display: none;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 768px) {
  .page-header {
    padding: 20px 16px 0;
  }

  .header-inner {
    flex-direction: column;
    align-items: flex-start;
  }

  .semester-grid {
    grid-template-columns: 1fr;
  }

  .td-professor {
    display: none;
  }

  .td-tags {
    width: auto;
  }

  .year-tab {
    padding: 10px 16px;
    font-size: 13px;
  }
}

@media (max-width: 480px) {
  .header-title h1 {
    font-size: 16px;
  }

  .track-legend {
    gap: 10px;
  }

  .td-credits {
    width: 40px;
  }

  .course-name-en {
    display: none;
  }

  .course-row td {
    padding: 8px 8px;
  }

  .course-icon {
    width: 28px;
    height: 28px;
  }

  .course-row td:first-child {
    width: 40px;
  }

  .year-tab {
    padding: 8px 12px;
    font-size: 12px;
  }
}

/* ============================================================
   PRINT
   ============================================================ */
@media print {
  .page-header {
    position: relative;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .semester-grid {
    grid-template-columns: 1fr 1fr;
  }

  .course-row:hover {
    background: none;
  }

  .year-section {
    display: block !important;
    break-inside: avoid;
    margin-bottom: 24px;
  }

  .year-section::before {
    content: attr(data-year-label);
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: var(--hufs-navy);
    margin-bottom: 8px;
  }

  .year-tabs {
    display: none;
  }
}
</style>

  { name:"의생명데이터분석", nameEn:"NGS Data Analysis", credits:3, year:4, semester:2, track:"데이터", hasLab:false, majorRequired:false, professor:"고윤희 교수님" },
];

// ============================================================
// UTILITIES
// ============================================================
function getIconPath(name) {
  const fn = name.replace(/\//g, '_');
  return 'course_icons/' + encodeURIComponent(fn) + '.png';
}

function trackClass(track) {
  if (track === '시스템') return 'track-system';
  if (track === '데이터') return 'track-data';
  return 'track-common';
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============================================================
// RENDER
// ============================================================
function renderCourseRow(c) {
  const tags = [];
  if (c.majorRequired) tags.push('<span class="tag tag-required">필수</span>');
  if (c.hasLab) tags.push('<span class="tag tag-lab">실습</span>');

  return `<tr class="course-row ${trackClass(c.track)}">
    <td><img class="course-icon" src="${getIconPath(c.name)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'"></td>
    <td class="td-name">
      <div class="course-name-kr">${escapeHtml(c.name)}</div>
      <div class="course-name-en">${escapeHtml(c.nameEn)}</div>
    </td>
    <td class="td-credits">${c.credits}학점</td>
    <td class="td-tags">${tags.join('')}</td>
    <td class="td-professor">${c.professor ? escapeHtml(c.professor) : ''}</td>
  </tr>`;
}

function renderSemester(courses, label) {
  if (courses.length === 0) return '';
  const rows = courses.map(renderCourseRow).join('');
  return `<div class="semester-card">
    <div class="semester-label">${label}</div>
    <table class="course-table"><tbody>${rows}</tbody></table>
  </div>`;
}

let activeYear = 1;

function switchYear(year) {
  activeYear = year;
  document.querySelectorAll('.year-section').forEach(el => {
    el.classList.toggle('active', el.dataset.year === String(year));
  });
  document.querySelectorAll('.year-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.year === String(year));
  });
}

function render() {
  // Tabs
  const tabsNav = document.getElementById('year-tabs');
  let tabsHtml = '';
  for (let y = 1; y <= 4; y++) {
    tabsHtml += `<button class="year-tab${y === 1 ? ' active' : ''}" data-year="${y}" onclick="switchYear(${y})">${y}학년</button>`;
  }
  tabsNav.innerHTML = tabsHtml;

  // Year sections
  const main = document.getElementById('main-content');
  let html = '';
  for (let y = 1; y <= 4; y++) {
    const yearCourses = COURSES.filter(c => c.year === y);
    const s1 = yearCourses.filter(c => c.semester === 1);
    const s2 = yearCourses.filter(c => c.semester === 2);
    html += `<section class="year-section${y === 1 ? ' active' : ''}" data-year="${y}" data-year-label="${y}학년">
      <div class="semester-grid">
        ${renderSemester(s1, '1학기')}
        ${renderSemester(s2, '2학기')}
      </div>
    </section>`;
  }
  main.innerHTML = html;
}

// ============================================================
// QUERY PARAMS: ?embed=true, ?theme=dark
// ============================================================
(function init() {
  const params = new URLSearchParams(window.location.search);

  if (params.get('embed') === 'true' || window.parent !== window) {
    document.body.classList.add('embed');
  }

  if (params.get('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
  }

  render();
})();
</script>
</body>
</html>
