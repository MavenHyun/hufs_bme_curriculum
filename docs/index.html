<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUFS 바이오메디컬공학부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --hufs-navy: #002D56;
  --hufs-green: #146E7A;
  --hufs-gold: #8D7150;
  --hufs-gray: #DADAD3;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #F5F5F2;
  color: #1A1A1A;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 520px;
  width: 100%;
  text-align: center;
}

.dept-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--hufs-green);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

h1 {
  font-size: 24px;
  font-weight: 700;
  color: var(--hufs-navy);
  margin-bottom: 6px;
}

.subtitle {
  font-size: 13px;
  font-weight: 300;
  color: #888;
  margin-bottom: 40px;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

a.card {
  display: flex;
  align-items: center;
  gap: 16px;
  background: #FFF;
  border: 1px solid var(--hufs-gray);
  border-radius: 10px;
  padding: 20px 24px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s, box-shadow 0.2s;
}

a.card:hover {
  border-color: var(--hufs-green);
  box-shadow: 0 2px 12px rgba(20, 110, 122, 0.1);
}

.card-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.card-icon.courses { background: #E8F0F2; }
.card-icon.curriculum { background: #F0EBE5; }
.card-icon.labs { background: #E5EEF4; }

.card-text { text-align: left; }

.card-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
}

.card-desc {
  font-size: 12px;
  font-weight: 300;
  color: #888;
  margin-top: 2px;
}

.arrow {
  margin-left: auto;
  color: var(--hufs-gray);
  font-size: 18px;
  flex-shrink: 0;
}

a.card:hover .arrow { color: var(--hufs-green); }

footer {
  margin-top: 48px;
  font-size: 11px;
  color: #AAA;
}

footer a {
  color: var(--hufs-green);
  text-decoration: none;
}
</style>
</head>
<body>
<div class="container">
  <div class="dept-label">Dept. of Biomedical Engineering</div>
  <h1>바이오메디컬공학부</h1>
  <p class="subtitle">한국외국어대학교 글로벌캠퍼스</p>

  <div class="cards">
    <a class="card" href="courses.html">
      <div class="card-icon courses">&#x1F4CB;</div>
      <div class="card-text">
        <div class="card-title">교과과정 안내</div>
        <div class="card-desc">학년별 교과목 목록 및 트랙 정보</div>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>
    <a class="card" href="curriculum.html">
      <div class="card-icon curriculum">&#x1F3AF;</div>
      <div class="card-text">
        <div class="card-title">수강 로드맵 빌더</div>
        <div class="card-desc">선수과목 기반 수강 계획 시뮬레이터</div>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>
    <a class="card" href="labs.html">
      <div class="card-icon labs">&#x1F52C;</div>
      <div class="card-text">
        <div class="card-title">연구실 소개</div>
        <div class="card-desc">교수별 연구실 및 연락처 안내</div>
      </div>
      <span class="arrow">&rsaquo;</span>
    </a>
  </div>
</div>

<footer>
  <a href="https://bme.hufs.ac.kr" target="_blank" rel="noopener">bme.hufs.ac.kr</a>
</footer>
</body>
</html>
